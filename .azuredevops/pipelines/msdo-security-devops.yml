trigger:
  branches:
    include:
      - main

schedules:
  - cron: '42 13 * * 5'
    displayName: Friday Microsoft Security DevOps scan
    branches:
      include:
        - main
    always: true

pool:
  vmImage: windows-latest

steps:
  - checkout: self
    clean: true

  - task: MicrosoftSecurityDevOps@1
    displayName: Run Microsoft Security DevOps
    inputs:
      tools: bandit,checkov,templateanalyzer,terrascan,trivy
      publish: true

  - task: AdvancedSecurity-Publish@1
    displayName: Publish MSDO SARIF to Advanced Security
    inputs:
      SarifsInputDirectory: '$(Build.ArtifactStagingDirectory)/.gdn/'
