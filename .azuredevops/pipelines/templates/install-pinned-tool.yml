parameters:
  - name: toolId
    type: string
  - name: version
    type: string
    default: ''
  - name: downloadUrl
    type: string
    default: ''
  - name: sha256
    type: string
    default: ''
  - name: destination
    type: string

steps:
  - pwsh: |
      $ErrorActionPreference = 'Stop'
      $manifestPath = Join-Path '$(Build.SourcesDirectory)' '.azuredevops/pipelines/config/tool-versions.json'
      $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json -Depth 100
      $reference = @($manifest.references | Where-Object id -eq '${{ parameters.toolId }}')
      if ($reference.Count -ne 1) {
          throw "Expected exactly one tool-versions.json entry for '${{ parameters.toolId }}'."
      }
      if ([string]::IsNullOrWhiteSpace('${{ parameters.version }}') -or
          [string]::IsNullOrWhiteSpace('${{ parameters.downloadUrl }}') -or
          [string]::IsNullOrWhiteSpace('${{ parameters.sha256 }}')) {
          throw "Version, immutable download URL, and SHA-256 are mandatory for '${{ parameters.toolId }}'."
      }
          if ($reference[0].PSObject.Properties.Name -contains 'version' -and $reference[0].version -ne '${{ parameters.version }}') {
            throw "Requested version is not the version pinned in tool-versions.json for '${{ parameters.toolId }}'."
          }
      if ('${{ parameters.downloadUrl }}' -match '(?i)(?:/|@)(latest|main|master)(?:/|$)') {
          throw "Mutable download reference is forbidden for '${{ parameters.toolId }}'."
      }
      if ('${{ parameters.sha256 }}' -notmatch '^[a-fA-F0-9]{64}$') {
          throw "A 64-character SHA-256 is required for '${{ parameters.toolId }}'."
      }
      $destination = '${{ parameters.destination }}'
      $parent = Split-Path -Parent $destination
      if ($parent) { New-Item -ItemType Directory -Path $parent -Force | Out-Null }
      Invoke-WebRequest -Uri '${{ parameters.downloadUrl }}' -OutFile $destination -UseBasicParsing
      $actual = (Get-FileHash -LiteralPath $destination -Algorithm SHA256).Hash
      if ($actual -ne '${{ parameters.sha256 }}') {
          Remove-Item -LiteralPath $destination -Force
          throw "SHA-256 verification failed for '${{ parameters.toolId }}'."
      }
    displayName: Install pinned ${{ parameters.toolId }}
