# Source parity: .github/workflows/enforce-ghas-policy.yml
governance:gitlab-policy:
  stage: governance
  image: registry.gitlab.com/gitlab-org/cli:v1.108.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "daily-governance"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never
  variables:
    GITLAB_TOKEN: $GITLAB_GOVERNANCE_TOKEN
  script:
    - mkdir -p governance-results
    - glab api "projects/$CI_PROJECT_ID/protected_branches" > governance-results/protected-branches.json
    - glab api "projects/$CI_PROJECT_ID/approval_rules" > governance-results/approval-rules.json || echo '[]' > governance-results/approval-rules.json
    - glab api "projects/$CI_PROJECT_ID" | jq '{default_branch,visibility,only_allow_merge_if_pipeline_succeeds,only_allow_merge_if_all_discussions_are_resolved,remove_source_branch_after_merge}' > governance-results/project-policy.json
    - test "$GITLAB_GOVERNANCE_APPLY" != "true" || glab api --method PUT "projects/$CI_PROJECT_ID" --field only_allow_merge_if_pipeline_succeeds=true --field only_allow_merge_if_all_discussions_are_resolved=true --field remove_source_branch_after_merge=true > governance-results/apply-result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - governance-results/

# Source parity: .github/workflows/static.yml
pages:
  stage: pages
  image: alpine:3.21.3
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never
  script:
    - test -f docs/index.html
    - cp -R docs public
    # Surface the aggregated security tool breakdown at /security when the summary job ran
    # (it does on main pushes). Guarded so `web` pipelines without scan results still publish.
    - if [ -d security-results/summary ]; then mkdir -p public/security && cp -R security-results/summary/. public/security/; fi
    - test -s public/index.html
  pages: true
  artifacts:
    expire_in: 30 days
    paths:
      - public/

docs:gitlab-wiki:
  extends: .powershell
  stage: pages
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never
  variables:
    GITLAB_WIKI_TOKEN: $GITLAB_WIKI_PUBLISH_TOKEN
  script:
    - pwsh -NoProfile -File scripts/gitlab/Publish-DocumentationWiki.ps1 -Mode Stage -RepositoryRoot "$CI_PROJECT_DIR" -StagingPath wiki-documentation
    - pwsh -NoProfile -File scripts/gitlab/Publish-DocumentationWiki.ps1 -Mode Publish -ManifestPath wiki-documentation/wiki-documentation-manifest.json
    # Push the aggregated security tool breakdown table to the wiki when the summary job ran
    # (it does on main pushes). Guarded so `web` pipelines without scan results still succeed.
    - if [ -f security-results/summary/summary.md ]; then pwsh -NoProfile -File scripts/gitlab/Publish-DocumentationWiki.ps1 -Mode PublishSecuritySummary -SummaryPath security-results/summary/summary.md; fi
  artifacts:
    expire_in: 30 days
    paths:
      - wiki-documentation/
