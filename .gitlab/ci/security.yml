.security-artifacts:
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - security-results/

# Source parity: .github/workflows/SAST-GitHubAdvancedSecurity-CodeQL.yml
sast:semgrep-codeql-replacement:
  stage: sast
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "sast-codeql"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  image:
    name: $SEMGREP_IMAGE
    entrypoint: [""]
  variables:
    SEMGREP_RULES: p/default
  script:
    - mkdir -p security-results/semgrep
    - semgrep scan --config "$SEMGREP_RULES" --gitlab-sast --output security-results/semgrep/gl-sast-report.json .
    - semgrep scan --config "$SEMGREP_RULES" --sarif --output security-results/semgrep/semgrep.sarif .
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      sast: security-results/semgrep/gl-sast-report.json
    paths:
      - security-results/semgrep/
  allow_failure: true

# Source parity: .github/workflows/SAST-ESLint.yml
sast:eslint:
  stage: sast
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "sast-eslint"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  image: node:22.14.0-bookworm-slim
  variables:
    npm_config_cache: $CI_PROJECT_DIR/.npm
    SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
  cache:
    key: eslint-$CI_PROJECT_ID
    paths:
      - .npm/
  script:
    - mkdir -p security-results/eslint
    - npm install --no-save --ignore-scripts --save-exact eslint@8.10.0 @microsoft/eslint-formatter-sarif@3.1.0
    - (cd src/webapp01 && npx eslint . --config .eslintrc.js --ext .js,.jsx,.ts,.tsx --format @microsoft/eslint-formatter-sarif --output-file ../../security-results/eslint/eslint.sarif) || true
    - test -s security-results/eslint/eslint.sarif
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - security-results/eslint/

# Source parity: .github/workflows/SAST-Kubesec.yml
sast:kubesec:
  extends:
    - .powershell
  stage: sast
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "sast-kubesec"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - |
      pwsh -NoProfile -Command - <<'PWSH'
      # The cluster-002 executor is non-privileged, so kubesec runs from its pinned
      # release binary instead of docker run. The version is derived from KUBESEC_IMAGE
      # to keep a single immutable source of truth.
      $version = ($env:KUBESEC_IMAGE -split ':')[-1]
      New-Item -ItemType Directory -Path security-results/kubesec -Force | Out-Null
      $archive = '/tmp/kubesec.tar.gz'
      Invoke-WebRequest -Uri "https://github.com/controlplaneio/kubesec/releases/download/$version/kubesec_linux_amd64.tar.gz" -OutFile $archive
      tar -xzf $archive -C /usr/local/bin kubesec
      $reports = [System.Collections.Generic.List[object]]::new()
      foreach ($manifest in @('manifests/critical-double.yaml', 'manifests/score-5-pod-serviceaccount.yaml')) {
        $output = & kubesec scan $manifest
        if ($LASTEXITCODE -notin @(0, 2)) { throw "Kubesec failed for $manifest." }
        foreach ($entry in @($output | ConvertFrom-Json -Depth 100)) {
          $entry.FileName = $manifest
          $reports.Add($entry)
        }
      }
      $reports | ConvertTo-Json -Depth 100 | Set-Content security-results/kubesec/kubesec.json
      ./scripts/sarif/Convert-KubesecToSarif.ps1 -InputPath security-results/kubesec/kubesec.json -OutputPath security-results/kubesec/kubesec.sarif
      PWSH
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - security-results/kubesec/
  allow_failure: true

# Source parity: .github/workflows/IACS-AquaSecurity-tfsec.yml
iac:tfsec:
  stage: iac
  image:
    name: $TFSEC_IMAGE
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "weekly-iac"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - mkdir -p security-results/tfsec
    - tfsec ./terraform --format sarif --out security-results/tfsec/tfsec.sarif || test "$?" = "1"
    - test -s security-results/tfsec/tfsec.sarif
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - security-results/tfsec/
  allow_failure: true

# Source parity: .github/workflows/IACS-Checkmarx-kics.yml
iac:kics:
  stage: iac
  image:
    name: $KICS_IMAGE
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "weekly-iac"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
