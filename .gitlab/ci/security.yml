# Source parity: .github/workflows/IACS-Microsoft-Security-DevOps.yml
iac:msdo-replacement:
  stage: iac
  image:
    name: $CHECKOV_IMAGE
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "weekly-iac"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
