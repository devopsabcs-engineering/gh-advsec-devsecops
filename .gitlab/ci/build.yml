# Source parity: .github/workflows/ci.yml
ci:dotnet-build:
  extends:
    - .dotnet
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "weekly-container-dast"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - dotnet restore gh-aspnet-webapp-01.sln
    - dotnet build gh-aspnet-webapp-01.sln --configuration Release --no-restore
    - dotnet publish src/webapp01/webapp01.csproj --configuration Release --no-restore --output src/webapp01/publish
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - src/webapp01/bin/Release/
      - src/webapp01/obj/project.assets.json
      - src/webapp01/publish/

ci:container-build:
  extends:
    - .rules:merge-request-and-main
  stage: build
  image: mcr.microsoft.com/azure-cli:2.71.0
  id_tokens:
    AZURE_OIDC_TOKEN:
      aud: api://AzureADTokenExchange
  script:
    - az login --service-principal --username "$ACR_CLIENT_ID" --tenant "$ACR_TENANT_ID" --federated-token "$AZURE_OIDC_TOKEN" --allow-no-subscriptions
    - az account set --subscription "$ACR_SUBSCRIPTION_ID"
    - az acr build --registry "$ACR_NAME" --image "$IMAGE_NAME:$CI_COMMIT_SHA" --image "$IMAGE_NAME:latest" --target final --file src/webapp01/Dockerfile src/webapp01

# Self-contained publish consumed by dast:zap. The non-privileged cluster-002 executor
# cannot build/run a container for DAST, so the app is published as a self-contained
# linux-x64 binary and executed directly inside the ZAP job container.
ci:dast-app-build:
  extends:
    - .dotnet
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCAN_PROFILE == "weekly-container-dast"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - dotnet restore src/webapp01/webapp01.csproj
    - dotnet publish src/webapp01/webapp01.csproj --configuration Release --self-contained true --runtime linux-x64 -p:InvariantGlobalization=true --output src/webapp01/dast-publish
  artifacts:
    expire_in: 7 days
    paths:
      - src/webapp01/dast-publish/