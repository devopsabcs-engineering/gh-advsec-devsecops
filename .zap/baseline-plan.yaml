---
env:
  contexts:
    - name: target
      urls:
        - ${ZAP_TARGET}
      includePaths:
        - ${ZAP_TARGET}.*
jobs:
  - type: spider
    parameters:
      context: target
      maxDuration: 5
  - type: passiveScan-wait
    parameters:
      maxDuration: 5
  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: baseline.html
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: baseline.json
  - type: report
    parameters:
      template: sarif-json
      reportDir: /zap/wrk
      reportFile: baseline.sarif